<!DOCTYPE html>
<html style="background:transparent;width:100%;height:100%">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>trace</title>
<link rel="icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}
#window {
  width: 100%; height: 100%;
  background: #121216;
  border-radius: 16px;
  display: flex; flex-direction: column;
  overflow: hidden;
  -webkit-mask-image: -webkit-radial-gradient(white, black);
  mask-image: radial-gradient(white, black);
  animation: popIn 0.18s cubic-bezier(0.16,1,0.3,1);
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.96) translateY(-8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
#window.closing {
  animation: popOut 0.12s cubic-bezier(0.55,0,1,0.45) both;
  pointer-events: none;
}
@keyframes popOut {
  from { opacity: 1; transform: scale(1) translateY(0); }
  to { opacity: 0; transform: scale(0.96) translateY(-6px); }
}
#search-row {
  display: flex; align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  flex-shrink: 0;
  gap: 10px;
}
#search-logo {
  width: 24px; height: 24px;
  border-radius: 4px;
  flex-shrink: 0;
}
#search-input {
  flex: 1;
  background: none; border: none; outline: none;
  color: #fff;
  font-size: 15px; font-weight: 400;
  font-family: inherit;
}
#search-input::placeholder { color: rgba(255,255,255,0.15); }
#ai-badge {
  display: none;
  font-size: 11px; font-weight: 600;
  color: #8b5cf6;
  background: rgba(139,92,246,0.12);
  padding: 2px 7px;
  border-radius: 5px;
  letter-spacing: 0.3px;
  white-space: nowrap;
  pointer-events: none;
  transition: opacity 0.2s;
  flex-shrink: 0;
}
#search-row.ai-mode { border-bottom-color: rgba(139,92,246,0.3); }
#search-row.ai-mode #ai-badge { display: inline; }
#search-row.ai-mode #search-input::placeholder { color: rgba(139,92,246,0.25); }
#send-btn {
  background: rgba(255,255,255,0.04);
  border: none; outline: none;
  color: rgba(255,255,255,0.2);
  cursor: pointer;
  width: 28px; height: 28px;
  border-radius: 8px;
  font-size: 14px;
  display: none;
  align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
#send-btn.active { display: flex; }
#send-btn.active:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
#body {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  position: relative;
  overflow: hidden;
}
#greeting {
  padding: 28px 22px 8px;
  flex-shrink: 0;
}
#greeting-text {
  font-size: 26px; font-weight: 700;
  letter-spacing: -0.5px;
  color: #fff;
  line-height: 1.2;
}
#greeting-sub {
  font-size: 13px; color: rgba(255,255,255,0.3);
  margin-top: 4px;
}
#content {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
}
#summary {
  padding: 6px 22px 14px;
  flex-shrink: 0;
  display: none;
  max-height: 35vh;
  overflow-y: auto;
}
#summary.visible { display: block; }
#summary::-webkit-scrollbar { width: 3px; }
#summary::-webkit-scrollbar-track { background: transparent; }
#summary::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
#summary.visible { display: block; }
#summary-text {
  font-size: 13.5px; line-height: 1.6;
  color: rgba(255,255,255,0.7);
}
#summary-stats {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 10px;
}
.stat-chip {
  padding: 3px 9px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 12px;
  font-size: 11px; color: rgba(255,255,255,0.3);
}
.stat-chip b { color: rgba(255,255,255,0.6); font-weight: 500; }
#events, #chat {
  flex: 1; overflow-y: auto;
  padding: 0 0 4px;
  scroll-behavior: smooth;
}
#chat { display: none; flex-direction: column; gap: 0; }
#convs-section { display: none; }
#convs-section.visible { display: block; }
#convs-header {
  padding: 16px 22px 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.1);
}
.conv-entry {
  display: flex; align-items: center;
  padding: 8px 22px;
  gap: 10px;
  cursor: pointer;
  transition: background 0.1s;
  animation: slideIn 0.2s ease both;
}
.conv-entry:hover { background: rgba(255,255,255,0.02); }
.conv-entry-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: rgba(255,255,255,0.03);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
  color: rgba(255,255,255,0.12);
}
.conv-entry-body { flex: 1; min-width: 0; }
.conv-entry-title {
  font-size: 13px;
  color: #c8c8d2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.conv-entry-meta {
  font-size: 11px;
  color: rgba(255,255,255,0.15);
  margin-top: 1px;
}
.conv-del {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: none; background: transparent;
  color: rgba(255,255,255,0.06);
  cursor: pointer;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.1s, color 0.1s, background 0.1s;
}
.conv-entry:hover .conv-del { opacity: 1; }
.conv-del:hover { color: #ff4444; background: rgba(255,68,68,0.08); }
#convs-empty {
  padding: 4px 22px 0;
  font-size: 12px;
  color: rgba(255,255,255,0.08);
}
#events::-webkit-scrollbar, #chat::-webkit-scrollbar { width: 3px; }
#events::-webkit-scrollbar-track, #chat::-webkit-scrollbar-track { background: transparent; }
#events::-webkit-scrollbar-thumb, #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
#events-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 8px;
  color: rgba(255,255,255,0.12); font-size: 13px;
}
#events-empty.hidden { display: none; }
.event-item {
  display: flex; align-items: flex-start;
  padding: 7px 22px;
  gap: 10px;
  transition: background 0.1s;
  animation: slideIn 0.2s ease both;
}
.event-item:hover { background: rgba(255,255,255,0.02); }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.event-icon {
  width: 22px; height: 22px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 11px; margin-top: 1px;
}
.event-icon.filesystem { background: rgba(90,200,250,0.08); color: #5ac8fa; }
.event-icon.browser { background: rgba(100,210,255,0.08); color: #64d2ff; }
.event-icon.editor { background: rgba(175,130,255,0.08); color: #af82ff; }
.event-icon.terminal { background: rgba(50,215,75,0.08); color: #32d74b; }
.event-icon.system { background: rgba(255,159,10,0.08); color: #ff9f0a; }
.event-icon.media { background: rgba(90,200,250,0.08); color: #5ac8fa; }
.event-body { flex: 1; min-width: 0; }
.event-title {
  font-size: 13px; color: #c8c8d2;
  line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.event-detail {
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.event-time {
  font-size: 11px;
  color: rgba(255,255,255,0.12);
  white-space: nowrap; flex-shrink: 0;
  padding-top: 2px; font-variant-numeric: tabular-nums;
}
/* Chat messages */
.chat-msg {
  padding: 18px 22px;
  animation: slideIn 0.2s ease both;
}
.msg-label {
  font-size: 10.5px;
  letter-spacing: 0.02em;
  color: rgba(255,255,255,0.12);
  margin-bottom: 3px;
  font-weight: 400;
}
.chat-msg.user .msg-label { text-align: right; }
.msg-text {
  font-size: 14px;
  line-height: 1.7;
  color: #d0d0dc;
}
.chat-msg.user .msg-text {
  color: rgba(255,255,255,0.45);
  text-align: right;
}
.msg-more {
  display: inline;
  color: rgba(100,210,255,0.6);
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
  transition: color 0.1s;
}
.msg-more:hover { color: rgba(100,210,255,0.9); }
.msg-memories {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.msg-memories .event-item {
  padding: 4px 10px;
  border-radius: 6px;
}
.msg-memories .event-item:hover {
  background: rgba(255,255,255,0.02);
}
.msg-memories .event-item .event-title {
  font-size: 12px;
}
.msg-memories .event-item .event-detail {
  font-size: 10px;
}
/* Typing indicator */
.typing-indicator {
  padding: 10px 22px;
  animation: slideIn 0.2s ease both;
}
.typing-line {
  display: inline-flex; gap: 8px; align-items: center;
  height: 20px;
}
.typing-logo {
  width: 16px; height: 16px;
  border-radius: 4px;
}
.shimmer {
  font-size: 13px;
  color: rgba(255,255,255,0.2);
  background: linear-gradient(90deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0.2) 100%);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 1.8s ease-in-out infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
#footer {
  display: flex; gap: 14px;
  padding: 7px 18px;
  border-top: 1px solid rgba(255,255,255,0.03);
  font-size: 11px;
  color: rgba(255,255,255,0.1);
  flex-shrink: 0;
}
kbd {
  display: inline-block; padding: 1px 5px;
  font-size: 10px; font-family: inherit;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 3px; margin: 0 1px;
  color: rgba(255,255,255,0.15);
}
.inline-code {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12.5px;
  background: rgba(255,255,255,0.04);
  padding: 1px 5px;
  border-radius: 3px;
  color: rgba(255,255,255,0.7);
}
#summary-loading {
  display: none;
  font-size: 12.5px;
  line-height: 1.5;
  color: rgba(255,255,255,0.15);
}
#summary-loading.visible { display: block; }
</style>
</head>
<body>
<div id="window">
  <div id="search-row">
    <img id="search-logo" src="" alt="">
    <input id="search-input" type="text" placeholder="Ask what you've been doing..." spellcheck="false" autofocus>
    <span id="ai-badge">AI</span>
    <button id="send-btn">↵</button>
  </div>
  <div id="body">
    <div id="greeting">
      <div id="greeting-text"></div>
      <div id="greeting-sub"></div>
    </div>
    <div id="content">
      <div id="summary">
        <div id="summary-loading"><span class="shimmer">Generating summary...</span></div>
        <div id="summary-text"></div>
        <div id="summary-stats"></div>
      </div>
      <div id="events">
        <div id="convs-section">
          <div id="convs-header">Past conversations</div>
          <div id="conv-list"></div>
        </div>
        <div id="events-empty">
          <span style="font-size:24px;opacity:0.3">~</span>
          <span>No activity yet</span>
        </div>
      </div>
      <div id="chat"></div>
    </div>
  </div>
  <div id="footer">
    <span><kbd>↵</kbd> ask</span>
    <span><kbd>/</kbd><kbd>new</kbd> new chat</span>
    <span><kbd>Esc</kbd> back / close</span>
  </div>
</div>
<script src="renderer.js"></script>
</body>
</html>
