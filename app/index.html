<!DOCTYPE html>
<html style="background:transparent;width:100%;height:100%">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>trace</title>
<link rel="icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}
#window {
  width: 100%; height: 100%;
  background: rgba(18,18,22,0.94);
  border-radius: 16px;
  display: flex; flex-direction: column;
  overflow: hidden;
  -webkit-mask-image: -webkit-radial-gradient(white, black);
  mask-image: radial-gradient(white, black);
  animation: popIn 0.18s cubic-bezier(0.16,1,0.3,1);
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.96) translateY(-8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
#window.closing {
  animation: popOut 0.12s cubic-bezier(0.55,0,1,0.45) both;
  pointer-events: none;
}
@keyframes popOut {
  from { opacity: 1; transform: scale(1) translateY(0); }
  to { opacity: 0; transform: scale(0.96) translateY(-6px); }
}
#search-row {
  display: flex; align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  flex-shrink: 0;
  gap: 10px;
}
#search-logo {
  width: 24px; height: 24px;
  border-radius: 4px;
  flex-shrink: 0;
}
#search-input {
  flex: 1;
  background: none; border: none; outline: none;
  color: #fff;
  font-size: 15px; font-weight: 400;
  font-family: inherit;
}
#search-input::placeholder { color: rgba(255,255,255,0.15); }
#send-btn {
  background: rgba(255,255,255,0.04);
  border: none; outline: none;
  color: rgba(255,255,255,0.2);
  cursor: pointer;
  width: 28px; height: 28px;
  border-radius: 8px;
  font-size: 14px;
  display: none;
  align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
#send-btn.active { display: flex; }
#send-btn.active:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
#body {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  position: relative;
}
#greeting {
  padding: 28px 22px 8px;
  flex-shrink: 0;
}
#greeting-text {
  font-size: 26px; font-weight: 700;
  letter-spacing: -0.5px;
  color: #fff;
  line-height: 1.2;
}
#greeting-sub {
  font-size: 13px; color: rgba(255,255,255,0.25);
  margin-top: 4px;
}
#content {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
}
#summary {
  padding: 6px 22px 14px;
  flex-shrink: 0;
  display: none;
}
#summary.visible { display: block; }
#summary-text {
  font-size: 13.5px; line-height: 1.6;
  color: rgba(255,255,255,0.65);
}
#summary-stats {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 10px;
}
.stat-chip {
  padding: 3px 9px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 12px;
  font-size: 11px; color: rgba(255,255,255,0.3);
}
.stat-chip b { color: rgba(255,255,255,0.6); font-weight: 500; }
#events, #chat {
  flex: 1; overflow-y: auto;
  padding: 0 0 4px;
  scroll-behavior: smooth;
}
#chat { display: none; flex-direction: column; gap: 0; }
#events::-webkit-scrollbar, #chat::-webkit-scrollbar { width: 3px; }
#events::-webkit-scrollbar-track, #chat::-webkit-scrollbar-track { background: transparent; }
#events::-webkit-scrollbar-thumb, #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
#events-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 8px;
  color: rgba(255,255,255,0.12); font-size: 13px;
}
#events-empty.hidden { display: none; }
.event-item {
  display: flex; align-items: flex-start;
  padding: 7px 22px;
  gap: 10px;
  transition: background 0.1s;
  animation: slideIn 0.2s ease both;
}
.event-item:hover { background: rgba(255,255,255,0.02); }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.event-icon {
  width: 22px; height: 22px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 11px; margin-top: 1px;
}
.event-icon.filesystem { background: rgba(90,200,250,0.08); color: #5ac8fa; }
.event-icon.browser { background: rgba(100,210,255,0.08); color: #64d2ff; }
.event-icon.editor { background: rgba(175,130,255,0.08); color: #af82ff; }
.event-icon.terminal { background: rgba(50,215,75,0.08); color: #32d74b; }
.event-icon.system { background: rgba(255,159,10,0.08); color: #ff9f0a; }
.event-body { flex: 1; min-width: 0; }
.event-title {
  font-size: 13px; color: rgba(255,255,255,0.75);
  line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.event-detail {
  font-size: 11px;
  color: rgba(255,255,255,0.15);
  margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.event-time {
  font-size: 11px;
  color: rgba(255,255,255,0.08);
  white-space: nowrap; flex-shrink: 0;
  padding-top: 2px; font-variant-numeric: tabular-nums;
}
/* Chat messages */
.chat-msg {
  padding: 10px 22px;
  animation: slideIn 0.2s ease both;
}
.chat-msg.user {
  display: flex; justify-content: flex-end;
}
.chat-msg.ai {
  padding-bottom: 4px;
}
.chat-bubble {
  max-width: 85%;
  padding: 8px 14px;
  border-radius: 12px;
  font-size: 13px; line-height: 1.5;
}
.chat-msg.user .chat-bubble {
  background: rgba(100,210,255,0.06);
  border: 1px solid rgba(100,210,255,0.1);
  color: rgba(255,255,255,0.7);
  border-bottom-right-radius: 4px;
}
.chat-msg.ai .chat-bubble {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.75);
  border-bottom-left-radius: 4px;
}
.chat-msg.ai .chat-events {
  margin-top: 8px;
  display: flex; flex-direction: column;
  gap: 2px;
}
.chat-msg.ai .chat-events .event-item {
  padding: 5px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.01);
}
.chat-msg.ai .chat-events .event-item:hover {
  background: rgba(255,255,255,0.03);
}
.chat-msg.ai .chat-events .event-item .event-title {
  font-size: 12px;
}
.chat-msg.ai .chat-events .event-item .event-detail {
  font-size: 10px;
}
/* Typing indicator */
.typing-indicator {
  padding: 10px 22px;
  animation: slideIn 0.2s ease both;
}
.typing-dots {
  display: inline-flex; gap: 4px; align-items: center;
  padding: 12px 16px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
}
.typing-logo {
  width: 16px; height: 16px;
  border-radius: 4px;
  animation: logoSpin 1s linear infinite;
}
@keyframes logoSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  animation: typingBounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}
#footer {
  display: flex; gap: 14px;
  padding: 7px 18px;
  border-top: 1px solid rgba(255,255,255,0.03);
  font-size: 11px;
  color: rgba(255,255,255,0.08);
  flex-shrink: 0;
}
kbd {
  display: inline-block; padding: 1px 5px;
  font-size: 10px; font-family: inherit;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 3px; margin: 0 1px;
  color: rgba(255,255,255,0.15);
}
</style>
</head>
<body>
<div id="window">
  <div id="search-row">
    <img id="search-logo" src="" alt="">
    <input id="search-input" type="text" placeholder="Ask what you've been doing..." spellcheck="false" autofocus>
    <button id="send-btn">↵</button>
  </div>
  <div id="body">
    <div id="greeting">
      <div id="greeting-text"></div>
      <div id="greeting-sub"></div>
    </div>
    <div id="content">
      <div id="summary">
        <div id="summary-text"></div>
        <div id="summary-stats"></div>
      </div>
      <div id="events">
        <div id="events-empty">
          <span style="font-size:24px;opacity:0.3">~</span>
          <span>No activity yet</span>
        </div>
      </div>
      <div id="chat"></div>
    </div>
  </div>
  <div id="footer">
    <span><kbd>↵</kbd> ask</span>
    <span><kbd>Esc</kbd> clear / close</span>
  </div>
</div>
<script src="renderer.js"></script>
</body>
</html>
