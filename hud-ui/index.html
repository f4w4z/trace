<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>trace</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header>
      <div class="logo"><img class="logo-icon" src="assets/logo.png" alt=""> trace</div>
    </header>

    <div id="search-container">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="Ask anything, or search your memory..." autofocus>
      <div id="search-shortcut"><kbd>/</kbd></div>
    </div>

    <div id="content">
      <div id="results-section" class="hidden">
        <div class="section-title">Results</div>
        <div id="results-list"></div>
      </div>

      <div id="empty-state">
        <div class="empty-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <p class="empty-title">Your memory, one question away</p>
        <p class="empty-sub">Ask in plain language — “what was I working on yesterday?” — and trace will find it.</p>
      </div>
    </div>

    <footer>
      <div class="footer-items">
        <span class="footer-item"><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
        <span class="footer-item"><kbd>⏎</kbd> open</span>
        <span class="footer-item"><kbd>Esc</kbd> clear</span>
      </div>
    </footer>
  </div>
<script src="app.js"></script>
</body>
</html>
