<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day HUD — smt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Day HUD</h1>
      <div id="status"></div>
    </header>

    <div id="search-container">
      <input type="text" id="search-input" placeholder="Search activity or ask a question..."
        autofocus spellcheck="false">
      <button id="search-btn" title="Search">&#x1F50D;</button>
      <label id="llm-toggle-label">
        <input type="checkbox" id="llm-toggle">
        LLM
      </label>
    </div>

    <div id="results">
      <div id="timeline">
        <h2>Today's Timeline</h2>
        <div id="timeline-content"></div>
      </div>
      <div id="summary">
        <h2>Daily Summary</h2>
        <div id="summary-content"></div>
      </div>
    </div>

    <div id="query-results" class="hidden">
      <h2>Results</h2>
      <div id="query-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
